[alembic]
# Ubicación de los scripts de migración (relativa a este archivo)
script_location = alembic

# Alembic leerá la URL de la BD desde env.py (que la obtiene de config.py)
# No la definimos aquí para evitar duplicar credenciales.
# sqlalchemy.url se establece dinámicamente en alembic/env.py

prepend_sys_path = .
version_path_separator = os  # Use os.pathsep. Default configuration.

[post_write_hooks]
# No se usan hooks por ahora.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
